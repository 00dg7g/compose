---
services:
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${DISK_DIR}/filebrowser_me:/srv
      - ${DOCKER_DIR}/filebrowser_me/database:/database
      - ${DOCKER_DIR}/filebrowser_me/config:/config
    ports:
      - ${FILEBROWSER_ME_PORT}:80
    restart: unless-stopped
