---
services:
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser_rest
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${DISK_DIR}/filebrowser_rest:/srv
      - ${DOCKER_DIR}/filebrowser_rest/database:/database
      - ${DOCKER_DIR}/filebrowser_rest/config:/config
    ports:
      - ${FILEBROWSER_REST_PORT}:80
    restart: unless-stopped
